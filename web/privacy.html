<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Privacy Policy | Witch Note</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: radial-gradient(circle at 50% 38%, #32104a, #17072d 58%, #080419);
        font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
        color: #f3ecff;
      }
      main {
        max-width: 560px;
        text-align: center;
      }
      h1 {
        font-size: 38px;
        font-weight: 800;
        letter-spacing: 0.5px;
      }
      p {
        margin-top: 16px;
        font-size: 18px;
        line-height: 1.6;
        color: #c9bfe0;
      }
      .footer-links {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 18px;
        display: flex;
        justify-content: center;
        gap: 18px;
        text-align: center;
      }
      a {
        color: #c9bfe0;
        font-size: 14px;
        text-decoration: underline;
        text-underline-offset: 3px;
        opacity: 0.82;
      }
      a:active {
        opacity: 0.65;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Privacy Policy</h1>
      <p>
        Witch Note does not collect, store, or process any user data.
      </p>
      <p>
        The app does not use accounts, analytics, tracking cookies, or external
        services to receive personal information.
      </p>
    </main>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="https://github.com/henrikerstad/witch-note" target="_blank" rel="noopener">
        GitHub
      </a>
    </div>
  </body>
</html>
